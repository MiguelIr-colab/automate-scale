services:
  api:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iassistant-api-secure.rule=Host(`api.aiassistant-bots.ch`)"
      - "traefik.http.routers.iassistant-api-secure.entrypoints=websecure"
      - "traefik.http.routers.iassistant-api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.iassistant-api-secure.service=iassistant-api-svc"
      - "traefik.http.services.iassistant-api-svc.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dokploy-network:
    external: true
